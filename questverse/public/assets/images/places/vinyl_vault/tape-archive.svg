    <text x="1025" y="360" text-anchor="middle" font-family="monospace" font-size="15" fill="#00fff5">REWIND LOCK</text>
  </g>

  <g opacity=".25">
    <rect width="1280" height="720" fill="none" stroke="#00fff5" stroke-width="2"/>
    <path d="M0 0h1280v720H0z" fill="url(#scan)"/>
  </g>
  <g stroke="#ffffff" opacity=".05">
    <path d="M0 34h1280M0 82h1280M0 130h1280M0 178h1280M0 226h1280M0 274h1280M0 322h1280M0 370h1280M0 418h1280M0 466h1280M0 514h1280M0 562h1280M0 610h1280M0 658h1280"/>
