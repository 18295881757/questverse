<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Vinyl Vault Tape Archive</title>
  <desc id="desc">A neon pixel-art tape archive room with VHS shelves, a monitor wall, reels, and a glowing film case.</desc>
  <rect width="1280" height="720" fill="#070716"/>
  <defs>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15102d"/>
      <stop offset="1" stop-color="#05050e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="1" height="8" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#ffffff" opacity=".2"/>
      <rect y="1" width="1" height="7" fill="transparent"/>
    </pattern>
  </defs>

  <rect y="440" width="1280" height="280" fill="url(#floor)"/>
  <path d="M0 440h1280M140 720 390 440M1140 720 890 440M320 720 480 440M960 720 800 440" stroke="#3a2a68" stroke-width="2" opacity=".7"/>
  <path d="M0 90h1280M0 160h1280M0 230h1280M0 300h1280" stroke="#22173d" stroke-width="2"/>

  <g opacity=".95">
    <rect x="96" y="148" width="240" height="358" rx="6" fill="#100b24" stroke="#b14dff" stroke-width="3"/>
    <g fill="#1d1437">
      <rect x="116" y="176" width="200" height="28"/>
      <rect x="116" y="220" width="200" height="28"/>
      <rect x="116" y="264" width="200" height="28"/>
      <rect x="116" y="308" width="200" height="28"/>
      <rect x="116" y="352" width="200" height="28"/>
      <rect x="116" y="396" width="200" height="28"/>
      <rect x="116" y="440" width="200" height="28"/>
    </g>
    <g fill="#f9e547" opacity=".75">
      <rect x="128" y="184" width="46" height="12"/>
      <rect x="190" y="228" width="68" height="12"/>
      <rect x="142" y="272" width="92" height="12"/>
      <rect x="210" y="316" width="54" height="12"/>
      <rect x="130" y="360" width="74" height="12"/>
      <rect x="178" y="404" width="100" height="12"/>
      <rect x="148" y="448" width="58" height="12"/>
    </g>
  </g>

  <g filter="url(#glow)">
    <rect x="500" y="220" width="260" height="170" rx="8" fill="#05050e" stroke="#00fff5" stroke-width="4"/>
    <rect x="524" y="244" width="212" height="106" fill="#0b2c2f"/>
    <path d="M540 282h180M540 302h180M540 322h180" stroke="#00fff5" stroke-width="2" opacity=".45"/>
    <text x="630" y="330" text-anchor="middle" font-family="monospace" font-size="20" fill="#f9e547">00:03:17</text>
    <rect x="570" y="365" width="120" height="10" fill="#ff2e88"/>
  </g>

  <g filter="url(#glow)">
    <rect x="548" y="470" width="190" height="82" rx="6" fill="#1a1230" stroke="#f9e547" stroke-width="3"/>
    <rect x="575" y="492" width="136" height="38" fill="#0b0716" stroke="#b14dff" stroke-width="2"/>
    <circle cx="598" cy="511" r="13" fill="none" stroke="#00fff5" stroke-width="3"/>
    <circle cx="688" cy="511" r="13" fill="none" stroke="#00fff5" stroke-width="3"/>
    <path d="M612 511h62" stroke="#00fff5" stroke-width="3"/>
    <text x="643" y="580" text-anchor="middle" font-family="monospace" font-size="18" fill="#f9e547">CUT FRAME</text>
  </g>

  <g opacity=".9">
    <rect x="910" y="172" width="230" height="236" rx="6" fill="#0e0a1e" stroke="#ff2e88" stroke-width="3"/>
    <circle cx="972" cy="252" r="42" fill="none" stroke="#b14dff" stroke-width="8"/>
    <circle cx="1078" cy="252" r="42" fill="none" stroke="#b14dff" stroke-width="8"/>
    <path d="M972 252h106" stroke="#f9e547" stroke-width="5"/>
